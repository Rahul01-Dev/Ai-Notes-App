# ─── Named volumes ──────────────────────────────────────────────────────────
volumes:
  redis_data:

# ─── Shared network ─────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_notes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # API (Express + Prisma) — uses Neon cloud DB via DATABASE_URL in server/.env
  # ──────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai_notes_api
    restart: unless-stopped
    env_file:
      - ./server/.env          # DATABASE_URL points to Neon cloud
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_URL: redis://redis:6379   # override localhost → redis container
    ports:
      - "5000:5000"
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Client (React + Vite → Nginx)
  # ──────────────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai_notes_client
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - api
