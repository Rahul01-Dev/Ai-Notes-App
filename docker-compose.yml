# ─── Named volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Shared network ─────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_notes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_notes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # API (Express + Prisma)
  # ──────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai_notes_api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Client (React + Vite → Nginx)
  # ──────────────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai_notes_client
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - api
