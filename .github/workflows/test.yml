name: Run API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ai_notes_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci || npm install

      - name: Run Prisma Migrations
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/ai_notes_test_db?schema=public
        run: npx prisma db push

      - name: Run Tests
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/ai_notes_test_db?schema=public
          JWT_SECRET: testing_secret_key_123
        run: npm run test
